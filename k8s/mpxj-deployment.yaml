apiVersion: v1
kind: Service
metadata:
  name: mpxj-service
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: mpxj-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mpxj-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mpxj-service
  template:
    metadata:
      labels:
        app: mpxj-service
    spec:
      containers:
        - name: mpxj-service
          image: aynuayex/cybersec-pmo:mpxj-service
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      imagePullSecrets:
        - name: dockerhub-registry
