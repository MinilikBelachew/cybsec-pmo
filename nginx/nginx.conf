# ==============================================================================
# Nginx Configuration Template for Single Domain Setup
# Location: /etc/nginx/sites-available/cybsec.addisanalytics.com
# ==============================================================================

# HTTP - Server Block (Certbot will automatically add SSL configuration and HTTPS redirection)
server {
    listen 80;
    listen [::]:80;
    server_name cybsec.addisanalytics.com www.cybsec.addisanalytics.com;

    client_max_body_size 20M;

    # --------------------------------------------------------------------------
    # Option A: Routing to DOCKER COMPOSE (If using docker-compose.prod.yml)
    # --------------------------------------------------------------------------
    
    # 1. Frontend Application (mapped to host port 3010 in docker-compose.prod.yml)
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Backend API (mapped to host port 6010 in docker-compose.prod.yml)
    location /api {
        proxy_pass http://127.0.0.1:6010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Socket.IO WebSocket (mapped to host port 6010 in docker-compose.prod.yml)
    location /socket.io {
        proxy_pass http://127.0.0.1:6010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------------------------
    # Option B: Routing to KUBERNETES (K3s) NodePorts
    # (If using K3s, comment out Option A locations and uncomment Option B)
    # --------------------------------------------------------------------------
    
